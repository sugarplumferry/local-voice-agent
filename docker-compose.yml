version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: voice-agent-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  speaches:
    # CPU version; swap to :latest-cuda for GPU support
    image: ghcr.io/speaches-ai/speaches:latest-cpu
    container_name: voice-agent-speaches
    ports:
      - "8000:8000"
    volumes:
      - speaches_models:/root/.cache/huggingface
    environment:
      - ENABLE_UI=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: voice-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voice-agent-backend
    ports:
      - "8080:8080"
      - "2024:2024"
    env_file:
      - .env
    depends_on:
      ollama:
        condition: service_healthy
      speaches:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - whisper_models:/root/.cache/huggingface   # cache Whisper model across restarts
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1

  frontend:
    image: nginx:alpine
    container_name: voice-agent-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  ollama_data:
  speaches_models:
  whisper_models:
  redis_data:
