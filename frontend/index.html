<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Voice Agent</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
    <header>
        <div class="header-title">
            <h1>Local Voice Agent</h1>
            <p>Speak English — get instant feedback</p>
        </div>
        <button id="btn-settings" class="icon-btn" title="Settings" aria-label="Open settings">⚙</button>
    </header>

    <div id="conversation" aria-live="polite" aria-label="Conversation"></div>

    <div class="bottom-bar">
        <!-- VU meter with draggable threshold marker -->
        <div class="vu-wrap" id="vu-meter" aria-hidden="true">
            <div id="threshold-marker" title="Drag to set threshold">
                <span id="lbl-threshold">-25dB</span>
            </div>
        </div>

        <div class="controls">
            <span id="status">Ready</span>
            <button id="btn-start" aria-label="Start listening" title="Start / Stop">
                🎙
            </button>
            <span id="status-right">&nbsp;</span>
        </div>

        <div class="settings">
            <div class="setting-item">
                <label for="sl-silence">Silence</label>
                <input type="range" id="sl-silence" min="300" max="1000" step="100" value="300" />
                <span id="lbl-silence">300ms</span>
            </div>
        </div>
    </div>
</div>

<!-- ── Settings Modal ───────────────────────────────────────────────────── -->
<div id="modal-settings" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
        <div class="modal-header">
            <span id="modal-title">Settings</span>
            <button id="btn-modal-close" class="icon-btn" aria-label="Close">✕</button>
        </div>

        <div class="modal-body">
            <!-- API Keys -->
            <div class="setting-group">
                <label class="setting-label" for="cfg-api-key">OpenAI API Key</label>
                <input type="password" id="cfg-api-key" placeholder="sk-..." autocomplete="off" spellcheck="false" />
            </div>
            <div class="setting-group">
                <label class="setting-label" for="cfg-groq-key">Groq API Key</label>
                <input type="password" id="cfg-groq-key" placeholder="gsk_..." autocomplete="off" spellcheck="false" />
            </div>

            <hr class="modal-divider" />

            <!-- STT -->
            <div class="setting-group">
                <span class="setting-label">Speech-to-Text</span>
                <div class="provider-toggle">
                    <label class="radio-label">
                        <input type="radio" name="stt" value="local" />
                        <span>Local <small>(Whisper)</small></span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="stt" value="openai" />
                        <span>OpenAI</span>
                    </label>
                </div>
            </div>

            <!-- TTS -->
            <div class="setting-group">
                <span class="setting-label">Text-to-Speech</span>
                <div class="provider-toggle">
                    <label class="radio-label">
                        <input type="radio" name="tts" value="local" />
                        <span>Local <small>(Speaches)</small></span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="tts" value="openai" />
                        <span>OpenAI</span>
                    </label>
                </div>
                <div class="sub-setting" id="tts-voice-row">
                    <label for="cfg-tts-voice">Voice</label>
                    <select id="cfg-tts-voice">
                        <option value="alloy">alloy</option>
                        <option value="echo">echo</option>
                        <option value="fable">fable</option>
                        <option value="onyx">onyx</option>
                        <option value="nova">nova</option>
                        <option value="shimmer">shimmer</option>
                    </select>
                </div>
            </div>

            <!-- LLM -->
            <div class="setting-group">
                <span class="setting-label">Language Model</span>
                <div class="provider-toggle">
                    <label class="radio-label">
                        <input type="radio" name="llm" value="local" />
                        <span>Local <small>(Ollama)</small></span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="llm" value="openai" />
                        <span>OpenAI</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="llm" value="groq" />
                        <span>Groq</span>
                    </label>
                </div>
                <div class="sub-setting" id="llm-model-row">
                    <label for="cfg-llm-model">Model</label>
                    <select id="cfg-llm-model">
                        <option value="gpt-4o-mini">gpt-4o-mini</option>
                        <option value="gpt-4o">gpt-4o</option>
                        <option value="gpt-4.1-mini">gpt-4.1-mini</option>
